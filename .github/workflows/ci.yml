name: CI – Linux Build & Smoke Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    name: Build & Test (Ubuntu, .NET 8, x64)
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. .NET 8 SDK ──────────────────────────────────────────────────────
      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # ── 3. Build & publish the managed C# library ─────────────────────────
      - name: Restore & publish ThermoWrapperManaged
        run: |
          dotnet nuget add source https://www.nuget.org/api/v2 --name nuget-v2 || true
          dotnet nuget add source https://github.com/thermofisherlsms/RawFileReader \
            --name thermo || true
          dotnet publish ThermoWrapperManaged.csproj \
            -c Release \
            -r linux-x64 \
            --self-contained false \
            -o publish
```

