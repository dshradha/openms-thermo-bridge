name: CI вЂ“ Linux Build & Smoke Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    name: Build & Test (Ubuntu, .NET 8, x64)
    runs-on: ubuntu-latest

    steps:
      # в”Ђв”Ђ 1. Checkout в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Checkout repository
        uses: actions/checkout@v4

      # в”Ђв”Ђ 2. .NET 8 SDK в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # в”Ђв”Ђ 3. Build & publish the managed C# library в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Restore & publish ThermoWrapperManaged
        run: |
          dotnet publish ThermoWrapperManaged.csproj \
            -c Release \
            -r linux-x64 \
            --self-contained false \
            -o publish

      - name: Verify managed artifacts exist
        run: |
          ls -lh publish/ThermoWrapperManaged.dll
          ls -lh publish/ThermoWrapperManaged.runtimeconfig.json

      # в”Ђв”Ђ 4. Locate the .NET hosting headers & libnethost в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Locate nethost headers and library
        id: nethost
        run: |
          NATIVE_DIR=$(find "$DOTNET_ROOT/packs" \
            -path "*/Microsoft.NETCore.App.Host.linux-x64/*/runtimes/linux-x64/native" \
            -type d | sort -V | tail -1)
          echo "native_dir=$NATIVE_DIR" >> "$GITHUB_OUTPUT"
          echo "Found native dir: $NATIVE_DIR"
          ls "$NATIVE_DIR"

      # в”Ђв”Ђ 5. Build the native C++ host в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Build thermo_host (C++)
        env:
          NATIVE_DIR: ${{ steps.nethost.outputs.native_dir }}
        run: |
          g++ -std=c++17 \
            -I"$NATIVE_DIR" \
            -L"$NATIVE_DIR" \
            ThermoWrapper.cpp \
            -o thermo_host \
            -lnethost -ldl \
            "-Wl,-rpath,$NATIVE_DIR" \
            -Wl,-rpath,'$ORIGIN/publish'

      - name: Confirm binary was produced
        run: |
          file thermo_host
          ldd thermo_host

      # в”Ђв”Ђ 6. Smoke test вЂ“ no real .raw file needed в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Smoke test вЂ“ no arguments (usage message)
        run: |
          set +e
          OUTPUT=$(./thermo_host 2>&1)
          EXIT=$?
          echo "exit=$EXIT  output=$OUTPUT"
          echo "$OUTPUT" | grep -qi "usage"
          echo "вњ“ Usage message printed"

      - name: Smoke test вЂ“ non-existent file (graceful error, no crash / SIGSEGV)
        run: |
          set +e
          OUTPUT=$(./thermo_host /tmp/nonexistent.raw 2>&1)
          EXIT=$?
          echo "exit=$EXIT"
          echo "output: $OUTPUT"
          if [ $EXIT -ge 128 ]; then
            echo "вќЊ Process crashed with signal exit code $EXIT"
            exit 1
          fi
          SCAN_LINE=$(echo "$OUTPUT" | grep -i "scan count" || true)
          if [ -n "$SCAN_LINE" ]; then
            COUNT=$(echo "$SCAN_LINE" | grep -oE '\-?[0-9]+')
            if [ "$COUNT" -ge 0 ]; then
              echo "вќЊ Expected negative scan count for missing file, got $COUNT"
              exit 1
            fi
            echo "вњ“ Returned error sentinel: $SCAN_LINE"
          else
            echo "вњ“ No scan count printed (file not opened)"
          fi

      # в”Ђв”Ђ 7. Upload artifacts for inspection в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: thermo-bridge-linux-x64
          path: |
            thermo_host
            publish/
          retention-days: 7